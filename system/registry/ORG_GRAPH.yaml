- id: system_pulse
  type: AUTOMATION
  name: Vòng lặp báo cáo nhịp đập OS, cảnh báo sập nguồn hoặc quá tải tài nguyên.
- id: update_hud
  type: AUTOMATION
  name: Vòng lặp cập nhật thông số và giao diện tổng quan AI OS liên tục.
- id: handoff_to_claude_code
  type: AUTOMATION
  name: Shell giữ quyền điều khiển và Handoff phiên làm việc.
- id: auto_sync_aios
  type: AUTOMATION
  name: Vòng lặp auto đẩy Backup lên kho chung mỗi 60s.
- id: process_github_queue
  type: AUTOMATION
  name: Khởi động chuỗi nạp thẻ CIV tự động (Format 6) khi có cục data nhét vào hòm
    thư.
- id: ontology_sweep
  type: AUTOMATION
  name: Chạy tự động quét rác dữ liệu mỗi chiều Thứ Sáu. Duy trì Zero Unlinked Entities.
- id: auto_evolution_engine
  type: AUTOMATION
  name: Lắng nghe kiến thức mới rơi vào Vault. Tự động trigger Ingest, phân tích Core
    Domain GAP. Nếu hụt Domain, TỰ ĐỘNG gọi ai-ml-aios_bot-antigravity-antigravity-kit-archivist-backend-architect-channel-cognitive_reflector-content-cost-manager-data-devops-editor-frontend-game-designer-growth-health-chief-hr-manager-intake-chief-it-manager-knowledge-legal-library-manager-maxkb-mobile-monitor-chief-nemoclaw-notebooklm-orchestrator_pro-org-architect-pmo-product-manager-project-intake-rd-lead-registry-manager-repo_ingest-scrum-master-security-engineer-software-architect-sre-strix-superpowers-test-manager-tinyclaw-ui-ux-web-researcher-agent-auto-create.md và create-dept.md
    để sinh Profile Đặc vụ và Phòng ban.
- id: repo_catalog_updater
  type: AUTOMATION
  name: 'Cập nhật tự động Master Repo Catalog hàng tuần: (1) Health check 38 ACTIVE
    repos, kiểm tra version mới. (2) Batch evaluate 50 URLs mới nhất từ PENDING. (3)
    Rebuild MASTER_REPO_CATALOG.md. (4) Notify CEO qua Telegram nếu Tier 1 có update.'
- id: repo_active_monitor
  type: AUTOMATION
  name: Khi CEO ra lệnh 'update repos' — chạy GitHub API check cho tất cả ACTIVE repos,
    xuất báo cáo version delta để CEO quyết định upgrade.
- id: memory_daemon
  type: AUTOMATION
  name: Long-Term Memory daemon using mem0ai + Qdrant local. Stores and retrieves
    vectorized session memories for persistent AI OS context.
- id: agent_bus
  type: AUTOMATION
  name: SQLite-based Pub/Sub Event Bus replacing blackboard.json for real-time task
    distribution between agents.
- id: telegram_bridge
  type: AUTOMATION
  name: 'Telegram ↔ AI OS bridge. Start: python AI OS REMOTE/infra/channels/start_bridges.py'
- id: clawtask_stack
  type: AUTOMATION
  name: 'ClawTask API :7474 + NullClaw workspace. Start: AI OS REMOTE/launcher/START
    AI OS.ps1'
- id: lightrag_server
  type: AUTOMATION
  name: 'LightRAG RAG server :9621. Start: python AI OS REMOTE/scripts/lightrag_server.py'
