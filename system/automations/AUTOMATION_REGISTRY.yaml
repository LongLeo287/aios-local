automations:
  system_pulse:
    type: daemon
    path: system/automations/daemons/system_pulse.py
    status: active
    owner: SRE-Agent
    description: Vòng lặp báo cáo nhịp đập OS, cảnh báo sập nguồn hoặc quá tải tài nguyên.
  update_hud:
    type: daemon
    path: system/automations/daemons/update_hud.ps1
    status: active
    owner: system
    description: Vòng lặp cập nhật thông số và giao diện tổng quan AI OS liên tục.
  handoff_to_claude_code:
    type: daemon
    path: system/automations/daemons/handoff_to_claude_code.ps1
    status: active
    owner: Antigravity
    description: Shell giữ quyền điều khiển và Handoff phiên làm việc.
  auto_sync_aios:
    type: daemon
    path: system/automations/daemons/auto_sync_aios.ps1
    status: paused
    owner: sec-agent
    description: Vòng lặp auto đẩy Backup lên kho chung mỗi 60s.
  process_github_queue:
    type: event
    path: system/automations/events/process_github_queue.py
    status: active
    owner: intake-chief-agent
    description: Khởi động chuỗi nạp thẻ CIV tự động (Format 6) khi có cục data nhét vào hòm thư.
  ontology_sweep:
    type: cron
    path: system/ops/scripts/ontology_auditor.py
    status: active
    owner: sre-agent
    description: Chạy tự động quét rác dữ liệu mỗi chiều Thứ Sáu. Duy trì Zero Unlinked Entities.
  auto_evolution_engine:
    type: event
    trigger: "file_created: storage/vault/DATA/.*"
    path:
      - system/ops/workflows/knowledge-ingest.md
      - system/ops/workflows/agent-auto-create.md
      - system/ops/workflows/create-dept.md
    status: active
    owner: registry-manager-agent
    description: Lắng nghe kiến thức mới rơi vào Vault. Tự động trigger Ingest, phân tích Core Domain GAP. Nếu hụt Domain, TỰ ĐỘNG gọi agent-auto-create.md và create-dept.md để sinh Profile đặc vụ và Phòng ban.

  repo_catalog_updater:
    type: cron
    trigger: "weekly (Monday 00:00)"
    path:
      - system/ops/scripts/build_master_catalog.py
      - system/ops/scripts/repo_eval_github_api.py
      - system/ops/workflows/repo-catalog-update.md
    status: active
    owner: knowledge_navigator
    description: "Cập nhật tự động Master Repo Catalog hàng tuần: (1) Health check 38 ACTIVE repos, kiểm tra version mới. (2) Batch evaluate 50 URLs mới nhất từ PENDING. (3) Rebuild MASTER_REPO_CATALOG.md. (4) Notify CEO qua Telegram nếu Tier 1 có update."

  repo_active_monitor:
    type: event
    trigger: "ceo_command: update repos"
    path:
      - system/ops/scripts/repo_eval_github_api.py
    status: active
    owner: archivist
    description: "Khi CEO ra lệnh 'update repos' — chạy GitHub API check cho tất cả ACTIVE repos, xuất báo cáo version delta để CEO quyết định upgrade."

  memory_daemon:
    type: daemon
    path: system/ops/scripts/memory_daemon.py
    status: active
    owner: knowledge_agent
    description: Long-Term Memory daemon using mem0ai + Qdrant local. Stores and retrieves vectorized session memories for persistent AI OS context.

  agent_bus:
    type: daemon
    path: system/ops/scripts/agent_bus.py
    status: active
    owner: orchestrator_pro
    description: SQLite-based Pub/Sub Event Bus replacing blackboard.json for real-time task distribution between agents.

  # ── REMOTE SERVICES (chạy từ <AI_OS_REMOTE_ROOT>) ──────────────────
  telegram_bridge:
    type: daemon
    location: REMOTE
    path: "<AI_OS_REMOTE_ROOT>\\infra\\channels\\start_bridges.py"
    status: active
    owner: channel-agent
    description: "Telegram ↔ AI OS bridge. Start: python AI OS REMOTE/infra/channels/start_bridges.py"

  clawtask_stack:
    type: daemon
    location: REMOTE
    path: "<AI_OS_REMOTE_ROOT>\\scripts\\start_nullclaw.ps1"
    port: 7474
    status: on_demand
    owner: it-manager-agent
    description: "ClawTask API :7474 + NullClaw workspace. Start: AI OS REMOTE/launcher/START AI OS.ps1"

  lightrag_server:
    type: daemon
    location: REMOTE
    path: "<AI_OS_REMOTE_ROOT>\\scripts\\lightrag_server.py"
    port: 9621
    status: on_demand
    owner: knowledge_agent
    description: "LightRAG RAG server :9621. Start: python AI OS REMOTE/scripts/lightrag_server.py"

