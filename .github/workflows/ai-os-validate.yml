name: Skill Validate & Plugin Audit

permissions:
  contents: read
on:
  push:
    paths:
      - '.github/workflows/**'
      - 'ecosystem/skills/**'
      - 'brain/skills/**'
      - 'ecosystem/plugins/**'
      - 'brain/shared-context/SKILL_REGISTRY.json'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'ecosystem/skills/**'
      - 'brain/skills/**'
      - 'ecosystem/plugins/**'

jobs:
  validate-skills:
    name: Validate SKILL.md Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all skill dirs have SKILL.md
        run: |
          python3 -c "
          import os, sys
          missing = 0
          for base in ['ecosystem/skills', 'brain/skills']:
              if not os.path.isdir(base): continue
              for d in os.listdir(base):
                  p = os.path.join(base, d)
                  if os.path.isdir(p) and not d.startswith('__'):
                      if not os.path.isfile(os.path.join(p, 'SKILL.md')):
                          print(f'❌ Missing SKILL.md: {p}')
                          missing += 1
          print(f'Missing SKILL.md: {missing}')
          if missing > 0: sys.exit(1)
          print('✅ All skills have SKILL.md')
          "

      - name: Validate SKILL.md required fields
        run: |
          python3 -c "
          import os, sys
          errors = 0
          reqs = ['name:', 'description:']
          for base in ['ecosystem/skills', 'brain/skills']:
              if not os.path.exists(base): continue
              for root, dirs, files in os.walk(base):
                  if 'SKILL.md' in files:
                      p = os.path.join(root, 'SKILL.md')
                      content = open(p, 'r', encoding='utf-8', errors='ignore').read()
                      for r in reqs:
                          if not any(line.strip().startswith(r) for line in content.splitlines()):
                              print(f\"❌ Missing field '{r[:-1]}' in: {p}\")
                              errors += 1
          print(f'Validation errors: {errors}')
          if errors > 0: sys.exit(1)
          print('✅ All SKILL.md files valid')
          "

  validate-registry:
    name: Validate SKILL_REGISTRY.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON syntax check
        run: |
          python3 -c "import json; json.load(open('brain/shared-context/SKILL_REGISTRY.json'))"
          echo "✅ SKILL_REGISTRY.json is valid JSON"

      - name: Check for duplicate IDs
        run: |
          python3 << 'EOF'
          import json
          reg = json.load(open("brain/shared-context/SKILL_REGISTRY.json"))
          entries = reg.get("skills", reg.get("entries", []))
          ids = [e.get("id") or e.get("name") for e in entries]
          dupes = [x for x in ids if ids.count(x) > 1]
          if dupes:
              print(f"❌ Duplicate IDs: {set(dupes)}")
              exit(1)
          print(f"✅ No duplicates — {len(ids)} unique entries")
          EOF

  validate-corp:
    name: Validate Corp YAML Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate corp YAML syntax
        run: |
          python3 << 'EOF'
          import yaml, os, sys
          errors = 0
          for root, dirs, files in os.walk("brain/shared-context/corp"):
              for f in files:
                  if f.endswith(".yaml"):
                      path = os.path.join(root, f)
                      try:
                          yaml.safe_load(open(path).read())
                          print(f"✅ {path}")
                      except yaml.YAMLError as e:
                          print(f"❌ {path}: {e}")
                          errors += 1
          if errors: sys.exit(1)
          EOF

      - name: Validate llm YAML files
        run: |
          python3 -c "
          import yaml
          import os
          for f in ['system/infra/llm/config.yaml', 'system/infra/llm/router.yaml', 'system/infra/llm/fallback_chain.yaml']:
              if os.path.exists(f):
                  yaml.safe_load(open(f).read())
                  print(f'✅ {f}')
          "
