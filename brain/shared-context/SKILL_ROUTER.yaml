# AI OS Corp — OpenClaw Skill Router
# Inspired by OpenClaw (🦞) Typed Pipeline Architecture
# Each pipeline type maps to a set of Workflows + Agents

version: "1.0"
schema: openclaw-pipeline-v1

pipelines:

  CODE:
    keywords: [code, viết, fix, bug, debug, build, app, feature, refactor, test, deploy, push, git]
    description: "Tạo/sửa code, build app, deploy"
    workflows:
      - ops/workflows/create-plugin.md
      - ops/workflows/build-fast-index.md
    agent: antigravity
    tool_hint: "shell + file_write"

  DESIGN:
    keywords: [design, ui, ux, giao diện, màu sắc, layout, figma, css, component, dashboard]
    description: "Thiết kế UI/UX, giao diện"
    workflows:
      - ops/workflows/nemoclaw-slides.md
    agent: nemoclaw
    tool_hint: "file_write + web_fetch"

  DATA:
    keywords: [data, database, sql, supabase, json, csv, phân tích, báo cáo, report, analytics, query]
    description: "Truy vấn dữ liệu, phân tích"
    workflows:
      - ops/workflows/data-ingest.md
    agent: antigravity
    tool_hint: "shell + web_fetch"

  RESEARCH:
    keywords: [tìm hiểu, nghiên cứu, search, so sánh, đánh giá, review, explain, giải thích, là gì]
    description: "Tìm kiếm, giải thích, nghiên cứu"
    agent: antigravity
    tool_hint: "web_search + file_read"

  OPS:
    keywords: [khởi động, restart, stop, deploy, docker, service, task, monitor, log, health, check]
    description: "Vận hành hệ thống, quản lý service"
    workflows:
      - ops/workflows/bot-reporting.md
      - ops/workflows/start-services.md
    agent: aios_bot
    tool_hint: "shell"

  PLAN:
    keywords: [lên kế hoạch, plan, roadmap, okr, sprint, brainstorm, ý tưởng, idea, strategy]
    description: "Lập kế hoạch, brainstorm"
    agent: antigravity
    tool_hint: "file_write"

  CHAT:
    keywords: []
    description: "Hội thoại thông thường, câu hỏi nhanh"
    agent: aios_bot
    tool_hint: "none — respond directly"
