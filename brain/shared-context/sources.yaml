## Deduplication Rules
- Check brain/knowledge/knowledge_index.md before ingesting
- If source URL already in KI frontmatter → SKIP
- If source domain matches existing KI → ENRICH existing, don't duplicate
- New unique content → create new KI in correct brain/knowledge/<domain>/

## Routing after Ingest
- research/papers → brain/knowledge/
- tools/repos → brain/knowledge/repos/ + REPO_CATALOG.md update
- security/CVE → brain/knowledge/cybersecurity/
- CEO-provided → follows knowledge-ingest.md (7-phase)
