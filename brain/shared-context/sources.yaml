  - id: arxiv-ai
    name: "ArXiv — AI/LLM papers"
    type: RSS | WEB
    url: "https://arxiv.org/list/cs.AI/recent"
    frequency: daily
    domain: research
    route_to: brain/knowledge/
    dept: rd
    enabled: true

  - id: huggingface-papers
    name: "HuggingFace Daily Papers"
    type: WEB
    url: "https://huggingface.co/papers"
