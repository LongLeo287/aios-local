# R&D Data Sources — Source List
# Owner: rd dept | Maintained by: data-collector-agent
# Updated: 2026-03-22 | Auto-synced: daily at 00:00 UTC + on-demand

## PURPOSE
sources.yaml defines where data-collector-agent fetches new knowledge.
Agent checks this list daily, deduplicates against brain/knowledge/, then ingests new content.

---

sources:
