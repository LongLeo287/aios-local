# Marketing Department Configuration
id: marketing
display_name: Marketing
head_agent: growth-agent
reports_to: growth-agent  # CMO = head
tier: dept

workers:
  - id: content-agent
    specialty: copywriting, blog, social, SEO, email campaigns
    primary_role: DEVELOPER
    qa_self_check: false
  - id: channel_agent
    specialty: Telegram bot, Discord, Zalo OA, Facebook Messenger
    primary_role: DEVELOPER
    qa_self_check: false

collaboration:
  receives_from:
    - dept: strategy
      type: campaign briefs, OKRs
    - dept: support
      type: customer feedback for content
  provides_to:
    - dept: operations
      type: published content log
    - dept: strategy
      type: engagement metrics

escalation_path:
  worker_to_head: subagents/mq/marketing_escalation.md
  head_to_cxo: CMO (growth-agent)
  trigger_conditions:
    - content blocked > 1hr
    - channel down > 15min

tools_available:
  - skills: web_intelligence, seo-aeo-optimization, notification_bridge, channel_agent
  - plugins: firecrawl, claude-mem, smart-search

kpi_ref: brain/corp/kpi_targets.yaml#marketing

